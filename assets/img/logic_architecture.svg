<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 950" width="100%" height="100%">
  <defs>
    <style>
      .base-text { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #2c3e50; font-weight: bold; }
      .title-text { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #ffffff; font-weight: bold; text-anchor: middle; }
      .cond-text { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #2c3e50; text-anchor: middle; }
      
      .block-start { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; }
      .block-process { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 2; }
      .block-condition { fill: #f1c40f; stroke: #f39c12; stroke-width: 2; }
      .block-action-alt { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .block-sleep { fill: #34495e; stroke: #2c3e50; stroke-width: 2; }
      
      .line-flow { fill: none; stroke: #34495e; stroke-width: 2; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#34495e" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <rect x="175" y="20" width="250" height="40" rx="20" class="block-start" />
  <text x="300" y="44" class="title-text">INICIO: Inicialización Hardware</text>
  <line x1="300" y1="60" x2="300" y2="90" class="line-flow" marker-end="url(#arrow)" />

  <rect x="125" y="90" width="350" height="40" rx="4" class="block-process" />
  <text x="300" y="114" class="base-text" text-anchor="middle">Lectura Sensores: DHT22, DS18B20, Hum, pH, EC</text>
  <line x1="300" y1="130" x2="300" y2="160" class="line-flow" marker-end="url(#arrow)" />

  <rect x="135" y="160" width="330" height="40" rx="4" class="block-process" />
  <text x="300" y="184" class="base-text" text-anchor="middle">Procesamiento Edge: Umbrales INIA</text>
  <line x1="300" y1="200" x2="300" y2="230" class="line-flow" />

  <line x1="300" y1="230" x2="180" y2="230" class="line-flow" />
  <line x1="300" y1="230" x2="420" y2="230" class="line-flow" />
  <line x1="180" y1="230" x2="180" y2="250" class="line-flow" marker-end="url(#arrow)" />
  <line x1="420" y1="230" x2="420" y2="250" class="line-flow" marker-end="url(#arrow)" />

  <polygon points="180,250 250,275 180,300 110,275" class="block-condition" />
  <text x="180" y="272" class="cond-text">¿Anomalías?</text>
  <text x="180" y="285" class="cond-text">(Flag = 1)</text>

  <polygon points="420,250 490,275 420,300 350,275" class="block-condition" />
  <text x="420" y="272" class="cond-text">¿Estado Óptimo?</text>
  <text x="420" y="285" class="cond-text">(Flag = 0)</text>

  <line x1="180" y1="300" x2="180" y2="330" class="line-flow" marker-end="url(#arrow)" />
  <line x1="420" y1="300" x2="420" y2="330" class="line-flow" marker-end="url(#arrow)" />

  <rect x="105" y="330" width="150" height="40" rx="4" class="block-action-alt" />
  <text x="180" y="354" class="title-text">Intervalo: 5 min</text>

  <rect x="345" y="330" width="150" height="40" rx="4" class="block-process" />
  <text x="420" y="354" class="base-text" text-anchor="middle">Intervalo: 15 min</text>

  <line x1="180" y1="370" x2="180" y2="400" class="line-flow" />
  <line x1="420" y1="370" x2="420" y2="400" class="line-flow" />
  <line x1="180" y1="400" x2="420" y2="400" class="line-flow" />
  
  <line x1="300" y1="400" x2="300" y2="430" class="line-flow" marker-end="url(#arrow)" />

  <rect x="160" y="430" width="280" height="40" rx="4" class="block-process" />
  <text x="300" y="454" class="base-text" text-anchor="middle">Compilación Payload JSON Comprimido</text>
  <line x1="300" y1="470" x2="300" y2="500" class="line-flow" marker-end="url(#arrow)" />

  <rect x="150" y="500" width="300" height="40" rx="4" class="block-process" />
  <text x="300" y="524" class="base-text" text-anchor="middle">Activación LoRa Ra-02 → Envío Paquete</text>
  <line x1="300" y1="540" x2="300" y2="570" class="line-flow" marker-end="url(#arrow)" />

  <rect x="175" y="570" width="250" height="40" rx="4" class="block-process" />
  <text x="300" y="594" class="base-text" text-anchor="middle">Espera ACK en Ventana RX1</text>
  <line x1="300" y1="610" x2="300" y2="640" class="line-flow" />

  <line x1="300" y1="640" x2="180" y2="640" class="line-flow" />
  <line x1="300" y1="640" x2="420" y2="640" class="line-flow" />
  <line x1="180" y1="640" x2="180" y2="660" class="line-flow" marker-end="url(#arrow)" />
  <line x1="420" y1="640" x2="420" y2="660" class="line-flow" marker-end="url(#arrow)" />

  <polygon points="180,660 250,685 180,710 110,685" class="block-condition" />
  <text x="180" y="689" class="cond-text">¿ACK recibido?</text>

  <polygon points="420,660 490,685 420,710 350,685" class="block-condition" />
  <text x="420" y="689" class="cond-text">¿Fallo enlace?</text>

  <line x1="180" y1="710" x2="180" y2="740" class="line-flow" marker-end="url(#arrow)" />
  <line x1="420" y1="710" x2="420" y2="740" class="line-flow" marker-end="url(#arrow)" />

  <rect x="115" y="740" width="130" height="40" rx="4" class="block-process" />
  <text x="180" y="764" class="base-text" text-anchor="middle">Limpiar Flags</text>

  <rect x="340" y="740" width="160" height="40" rx="4" class="block-action-alt" />
  <text x="420" y="764" class="title-text">Buffer Flash SPIFFS</text>

  <line x1="180" y1="780" x2="180" y2="810" class="line-flow" />
  <line x1="420" y1="780" x2="420" y2="810" class="line-flow" />
  <line x1="180" y1="810" x2="420" y2="810" class="line-flow" />
  
  <line x1="300" y1="810" x2="300" y2="840" class="line-flow" marker-end="url(#arrow)" />

  <rect x="160" y="840" width="280" height="45" rx="10" class="block-sleep" />
  <text x="300" y="866" class="title-text">DEEP SLEEP</text>
  <text x="300" y="878" class="title-text">RTC Timer → &lt; 15 µA</text>
</svg>
