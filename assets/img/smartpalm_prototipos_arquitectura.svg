<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitectura de los dos prototipos SmartPalm</title>
  <desc>Diagrama de flujo mostrando cómo el Prototipo 1 (Nodo Sensor) envía datos por WiFi al Prototipo 2 (Edge Node Gateway), el cual los almacena en buffer y los reenvía al Flask Edge API en el computador.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="520" fill="#ffffff"/>

  <!-- Prototipo 1 -->
  <rect x="190" y="30" width="300" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="54" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Prototipo 1 — Nodo Sensor</text>
  <text x="340" y="74" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">ESP32 + DHT11 + HW-390 + ARD-LDR</text>

  <line x1="340" y1="94" x2="340" y2="166" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="354" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">WiFi directo (AP del Prototipo 2)</text>
  <text x="354" y="136" font-family="sans-serif" font-size="12" fill="#5F5E5A">HTTP POST readings[]</text>
  <text x="354" y="152" font-family="sans-serif" font-size="12" fill="#5F5E5A">→ 192.168.4.1:5001</text>

  <!-- Prototipo 2 -->
  <rect x="160" y="166" width="360" height="92" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="190" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Prototipo 2 — Edge Node / Gateway</text>
  <text x="340" y="208" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">ESP32 + LCD 1602A · crea AP SmartPalm-EdgeNode</text>
  <text x="340" y="226" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Recibe, valida y almacena en buffer (20 lecturas)</text>
  <text x="340" y="244" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Reenvía en lote al Flask Edge API</text>

  <line x1="340" y1="258" x2="340" y2="330" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="354" y="282" font-family="sans-serif" font-size="12" fill="#5F5E5A">WiFi externo (red doméstica/laboratorio)</text>
  <text x="354" y="300" font-family="sans-serif" font-size="12" fill="#5F5E5A">HTTP POST readings[]</text>
  <text x="354" y="316" font-family="sans-serif" font-size="12" fill="#5F5E5A">→ &lt;IP-PC&gt;:5001</text>

  <!-- Flask Edge API -->
  <rect x="190" y="330" width="300" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="354" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Flask Edge API — Computador</text>
  <text x="340" y="374" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">Python · Flask · SQLite · puerto 5001</text>

  <!-- Leyenda -->
  <rect x="60" y="430" width="560" height="60" rx="8" fill="none" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
  <rect x="80" y="446" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text x="98" y="455" font-family="sans-serif" font-size="12" fill="#444441">Nodo de campo</text>
  <rect x="230" y="446" width="12" height="12" rx="2" fill="#7F77DD"/>
  <text x="248" y="455" font-family="sans-serif" font-size="12" fill="#444441">Nodo gateway</text>
  <rect x="380" y="446" width="12" height="12" rx="2" fill="#888780"/>
  <text x="398" y="455" font-family="sans-serif" font-size="12" fill="#444441">Backend</text>
  <text x="80" y="478" font-family="sans-serif" font-size="12" fill="#888780">El Prototipo 2 replica a menor escala el patrón "nodo de campo → gateway → cloud" del diseño conceptual</text>
</svg>
