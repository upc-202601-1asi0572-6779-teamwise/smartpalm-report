<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <title>SmartPalm - Diagrama de pines ESP32</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="580" fill="#ffffff"/>
  <rect x="240" y="180" width="200" height="220" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="340" y="202" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">ESP32-WROOM-32</text>
  <text x="340" y="220" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">240 MHz · dual-core · ADC 12-bit</text>
  <text x="252" y="252" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 34 ·</text>
  <text x="252" y="272" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 32 ·</text>
  <text x="252" y="292" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 33 ·</text>
  <text x="252" y="312" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 35 ·</text>
  <text x="252" y="332" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 36 ·</text>
  <text x="252" y="352" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 21 ·</text>
  <text x="252" y="372" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">GPIO 22 ·</text>
  <text x="428" y="252" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 18</text>
  <text x="428" y="272" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 19</text>
  <text x="428" y="292" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 23</text>
  <text x="428" y="312" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 5</text>
  <text x="428" y="332" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 14</text>
  <text x="428" y="352" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· GPIO 2</text>
  <text x="428" y="372" text-anchor="end" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">· 3.3V / GND</text>
  <!-- DHT22 -->
  <rect x="40" y="36" width="130" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="54" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">DHT22</text>
  <text x="105" y="70" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">temp + humedad aire</text>
  <line x1="170" y1="58" x2="238" y2="252" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Soil -->
  <rect x="40" y="106" width="130" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="124" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Soil moisture</text>
  <text x="105" y="140" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">capacitive v1.2</text>
  <line x1="170" y1="128" x2="238" y2="272" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- DS18B20 -->
  <rect x="40" y="176" width="130" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="194" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">DS18B20</text>
  <text x="105" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">temp suelo 1-Wire</text>
  <line x1="170" y1="198" x2="238" y2="292" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- pH -->
  <rect x="40" y="246" width="130" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="105" y="264" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">pH sensor</text>
  <text x="105" y="280" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#BA7517">SEN0161 · 0–14</text>
  <line x1="170" y1="268" x2="238" y2="312" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- EC -->
  <rect x="40" y="316" width="130" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="105" y="334" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">EC sensor</text>
  <text x="105" y="350" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#BA7517">conductividad µS/cm</text>
  <line x1="170" y1="338" x2="238" y2="332" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- LCD -->
  <rect x="40" y="386" width="130" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="105" y="404" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">LCD 1602 I2C</text>
  <text x="105" y="420" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">display · 0x27</text>
  <line x1="170" y1="395" x2="238" y2="352" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="170" y1="413" x2="238" y2="372" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- LoRa -->
  <rect x="510" y="196" width="140" height="136" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="580" y="220" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">LoRa SX1276</text>
  <text x="580" y="238" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Ra-02 · 915 MHz</text>
  <text x="580" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">SCK · MISO · MOSI</text>
  <text x="580" y="276" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">NSS · RST · DIO0</text>
  <text x="580" y="296" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">bus SPI completo</text>
  <text x="580" y="316" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">antena 3 dBi SMA</text>
  <line x1="440" y1="252" x2="508" y2="252" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="272" x2="508" y2="270" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="292" x2="508" y2="288" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="312" x2="508" y2="306" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="332" x2="508" y2="324" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="352" x2="508" y2="332" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Power -->
  <rect x="180" y="446" width="320" height="56" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="468" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404">Sistema de energía</text>
  <text x="340" y="486" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3B6D11">Panel solar 5W → TP4056 → LiPo 3.7V 5000mAh → Boost 5V</text>
  <line x1="340" y1="446" x2="340" y2="402" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Legend -->
  <rect x="40" y="524" width="600" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
  <rect x="56" y="537" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="72" y="545" font-family="sans-serif" font-size="12" fill="#444441">Sensores ambientales</text>
  <rect x="240" y="537" width="10" height="10" rx="2" fill="#BA7517"/>
  <text x="256" y="545" font-family="sans-serif" font-size="12" fill="#444441">Sensores suelo</text>
  <rect x="390" y="537" width="10" height="10" rx="2" fill="#185FA5"/>
  <text x="406" y="545" font-family="sans-serif" font-size="12" fill="#444441">SPI LoRa</text>
  <rect x="510" y="537" width="10" height="10" rx="2" fill="#3B6D11"/>
  <text x="526" y="545" font-family="sans-serif" font-size="12" fill="#444441">Energía</text>
</svg>
